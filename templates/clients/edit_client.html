{% extends "menu.html" %}

{% block title %}Modifier le client{% endblock %}

{% block content %}

    <div class="actions" style="justify-content: flex-end; gap:8px; align-items:center;">
        <h1 style="flex:1">Modifier le client</h1>

        <a href="{{ url_for('client_detail', client_id=client.client_id) }}" class="primary-button icon-button"
           aria-label="Annuler">
            <!-- arrow-left / cancel icon -->
            <i class="fa-solid fa-arrow-left"></i>
        </a>


        <form action="{{ url_for('supprimer_client', client_id=client.client_id  ) }}" method="post"
              onsubmit="return confirm('Voulez-vous vraiment supprimer ce client ? Cette action est irréversible !');">
            <button type="submit" class="danger-button icon-button" aria-label="Supprimer"
                    id="delete-interaction-button" title="Supprimer" data-id="{{ client.client_id }}">
                <!-- trash icon -->
                <i class="fa-solid fa-trash"></i>
            </button>
        </form>


    </div>

    <section class="container" style="margin-top:12px;">

        <form class="form-create-client" method="post" style="display : flex; flex-direction: column; gap: 5px;">
            <div class="input-box">
                <label class="form-label" for="nom_entreprise">Nom de l'entreprise</label>
                <input id="nom_entreprise" name="nom_entreprise" type="text" value="{{ client.nom_entreprise }}"
                       placeholder="Nom de l'entreprise cliente" required maxlength="200">
                <div class="field-error" id="error-nom_entreprise"></div>
            </div>

            <div class="input-box">
                <label class="form-label" for="contact_nom">Nom du contact</label>
                <input id="contact_nom" name="contact_nom" type="text" value="{{ client.contact_nom }}"
                       placeholder="Nom du contact" required maxlength="120">
                <div class="field-error" id="error-contact_nom"></div>
            </div>

            <div class="input-box">
                <label class="form-label" for="contact_email">E-mail du contact</label>
                <input id="contact_email" name="contact_email" type="email" value="{{ client.contact_email }}"
                       placeholder="Mail du contact" pattern="^[^@\s]+@[^@\s]+\.[^@\s]+$" maxlength="200">
                <div class="help-text">Format attendu : adresse@exemple.tld</div>
                <div class="field-error" id="error-contact_email"></div>
            </div>

            <div class="input-box">
                <label class="form-label" for="contact_telephone">Téléphone du contact</label>
                <input id="contact_telephone" name="contact_telephone" type="tel" value="{{ client.contact_telephone }}"
                       placeholder="Téléphone du contact" pattern="^[0-9+()\-\s]{6,25}$" maxlength="25">
                <div class="help-text">Chiffres, espaces, +, - et parenthèses autorisés.</div>
                <div class="field-error" id="error-contact_telephone"></div>
            </div>

            <div class="input-box">
                <label class="form-label" for="type_client">Type de client</label>
                <select id="type_client" name="type_client" required>
                    <option value=""> --Sélectionnez un type--</option>
                    <option value="Prospect" {% if client.type_client == "Prospect" %}selected{% endif %}> Prospect
                    </option>
                    <option value="Actif" {% if client.type_client == "Actif" %}selected{% endif %}> Actif</option>
                    <option value="Ancien" {% if client.type_client == "Ancien" %}selected{% endif %}> Ancien</option>
                </select>
                <div class="field-error" id="error-type_client"></div>
            </div>
            <div class="input-box">
                <label class="form-label" for="interlocuteur">Interlocuteur principal</label>
                <select id="interlocuteur" name="interlocuteur" required>
                    <option value=""> -- Qui est l'interlocuteur principal? --</option>
                    {% for i in context.interlocuteurs %}
                        <option value="{{ i.utilisateur_id }}"
                                {% if client.interlocuteur_principal_id == i.utilisateur_id %}selected{% endif %}> {{ i.nom }} {{ i.prenom }}  </option>
                    {% endfor %}
                </select>
                <div class="field-error" id="error-interlocuteur"></div>
            </div>

            <div class="column">
                <div class="input-box">
                    <label class="form-label" for="loc_lat">Latitude</label>
                    <input id="loc_lat" name="loc_lat" type="text" value="{{ client.localisation_lat }}"
                           placeholder="Latitude de l'entreprise">
                    <div class="field-error" id="error-loc_lat"></div>
                </div>

                <div class="input-box">
                    <label class="form-label" for="loc_lng">Longitude</label>
                    <input id="loc_lng" name="loc_lng" type="text" value="{{ client.localisation_lng }}"
                           placeholder="Longitude de l'entreprise">
                    <div class="field-error" id="error-loc_lng"></div>
                </div>
            </div>

            <div class="input-box">
                <label class="form-label" for="address">Adresse</label>
                <input id="address" name="address" type="text" value="{{ client.address }}"
                       placeholder="Adresse de l'entreprise">
                <div class="field-error" id="error-address"></div>
            </div>
            <div style="display:flex; gap:8px; justify-content:flex-end; margin-top:10px;">
                <input type="submit" class="primary-button" value="Modifier le client">
            </div>
        </form>

    </section>


    <script src="/scripts/interactions.js"></script>

{% endblock %}
