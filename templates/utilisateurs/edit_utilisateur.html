{% extends "menu.html" %}

{% block title %}Modifier l'utilisateur{% endblock %}

{% block content %}

  <div class="actions" style="justify-content: flex-end; gap:8px; align-items:center;">
    <h1 style="flex:1">Modifier l'utilisateur</h1>

    <a href="/utilisateurs/{{ utilisateur.utilisateur_id }}" class="primary-button icon-button" aria-label="Annuler">
      <!-- arrow-left / cancel icon -->
      <i class="fa-solid fa-arrow-left"></i>
    </a>



    <form action="{{ url_for('supprimer_utilisateur', user_id=utilisateur['utilisateur_id']) }}" method="post"
      onsubmit="return confirm('Voulez-vous vraiment supprimer cet utilisateur ? Cette action est irréversible !');">
     <button type="submit" class="danger-button icon-button" aria-label="Supprimer" id="delete-interaction-button" title="Supprimer" data-id="{{ utilisateur.utilisateur_id }}">
        <!-- trash icon -->
        <i class="fa-solid fa-trash"></i>
      </button>
    </form>


  </div>

  <section class="container" style="margin-top:12px;">

    <form method="Post" class="form-create-user" method="post" style="display : flex; flex-direction: column; gap: 5px;">
      <input name="e-mail" type="email" value="{{utilisateur.email}}" placeholder="e-mail" required>
      <input name="nom" type="text" value="{{utilisateur.nom}}" placeholder="Nom">
      <input name="prenom" type="text" value="{{utilisateur.prenom}}" placeholder="Prénom">
      <select name="role" required>
          <option value="" hidden=> --Sélectionnez un rôle-- </option>
          {% for i in context.roles_possibles %}
          <option value={{i[0]}} {% if utilisateur.role_id == i[0] %}selected{% endif %} > {{i[1]}} </option>
          {% endfor %}
      </select>
      <div>
        <label for="est_intervenant">Le membre a le statut d'intervenant</label>
          <select name="est_intervenant" required>
            <option value="" hidden> --Sélectionnez une option-- </option>
            <option value="True" {% if utilisateur.est_intervenant%}selected{% endif %} >Oui</option>
            <option value="False" {% if not utilisateur.est_intervenant%}selected{% endif %} >Non</option>
          </select>
      </div>
      <div>
          <input name="h_disp" value="{{utilisateur.heures_dispo_semaine}}" id="h_disp" type="number">
          <label for="h_disp"> Nombre d'heures moyen par semaine où l'intervenant est disponible</label>
      </div>
      <input name="doc_car" value="{{utilisateur.doc_carte_vitale}}" type="text" placeholder="Lien vers la carte vitale">
      <input name="doc_cni" value="{{utilisateur.doc_cni}}" type="text" placeholder="Lien vers la CNI">
      <input name="doc_adh" value="{{utilisateur.doc_adhesion}}" type="text" placeholder="Lien vers le document d'adhésion">
      <input name="doc_rib" value="{{utilisateur.doc_rib}}" type="text" placeholder="Lien vers le RIB">
      <input type="submit" value="Modifier l'utilisateur">
    </form>


  </section>


    <script src="/scripts/interactions.js"></script>

{% endblock %}
