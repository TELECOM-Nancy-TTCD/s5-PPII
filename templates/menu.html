<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <title>{% block title %}TNS'app{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" type="image/svg" href="static/tns_logo_icon_couleur.svg"/>
</head>
<body>

    <nav class="main-menu">
        <img class="main-menu-img" src="{{ url_for('static', filename='tns_logo_icon_couleur.svg') }}" alt="Logo TNS" width="60">

        <ul class="main-menu-items">
            <li><a href="{{ url_for('accueil') }}">Accueil</a></li>
            <li><a href="{{ url_for('clients') }}">Clients</a></li>
            <li><a href="{{ url_for('utilisateurs') }}">Utilisateurs</a></li>
            <li><a href="{{ url_for('conventions.index')}}">Conventions</a></li>
            <li><a href="{{ url_for('recherche_avance') }}">Recherche</a></li>
        </ul>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <nav class="footer-menu">
        
            <ul class="footer-menu-items">
                <li><a href="{{ url_for('cgu') }}">CGU</a></li>
                <li><a href="{{ url_for('contact') }}">Contact</a></li>
                <li><a href="{{ url_for('rgpd') }}">RGPD</a></li>
                
            </ul>
        </nav>
    </footer>

</body>
</html>
