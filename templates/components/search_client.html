<!-- Composant de recherche de client
     - preselected_client_id : id du client pré-sélectionné (sera placé dans l'input hidden)
     - preselected_client_name : nom affiché dans le champ de recherche
-->
<div class="input-box" id="client-search-box">
    <label for="client-search">Client</label>
    <input name="client-search" autocomplete="off" placeholder="Rechercher un client (nom, email, ... )" type="text" id="client-search" value="{{ preselected_client_name or '' }}" data-selected-id="{{ preselected_client_id or '' }}">
    <input name="client-id" type="hidden" id="client-id" value="{{ preselected_client_id or '' }}">
    <ul class="client-suggestions hidden" id="client-suggestions" role="listbox" aria-label="Suggestions clients"></ul>
    <!-- Conteneur d'erreur spécifique au champ client -->
    <div class="field-error text-danger" id="error-client-id"></div>
</div>

<script src="/static/scripts/search-client.js"></script>
